# The DB path is controlled by OSV_SCANNER_LOCAL_DB_CACHE_DIRECTORY env var,
# NOT by this config file. This file is for vulnerability ignore rules only.
#
# Usage: wraith scan --offline --config .harness/osv-scanner.toml <lockfile>

