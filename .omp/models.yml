# vulnops harness — custom on-prem LLM provider
# Points to an OpenAI-compatible endpoint (offline / on-prem).
#
# Uses explicit model listing — no /v1/models call needed.
# Endpoint can be unreachable at OMP startup; models are hardcoded.

providers:
  on-prem:
    baseUrl: ON_PREM_LLM_BASE_URL
    apiKey: ON_PREM_API_KEY
    api: openai-completions
    auth: apiKey

    models:
      - id: google/gemma-4-31b-qat
        name: Gemma 4 31B QAT
        contextWindow: 32768
        maxTokens: 8192
